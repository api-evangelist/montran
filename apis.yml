specificationVersion: '0.18'
name: Montran
description: >-
  Montran Corporation provides technologically advanced critical payments, cash
  management, and securities solutions to commercial banks, corporates, central
  banks, and clearing institutions in over 90 countries. With more than 45 years
  of innovation, Montran offers market infrastructure solutions including RTGS,
  ACH, instant payments, and central securities depository systems.
image: https://www.montran.com/logo.png
url: https://www.montran.com
