  - name: Montran Virtual Accounts
    description: >-
      A bank-agnostic Virtual Account Management platform that enables rapid
      deployment of virtual account structures for POBO/COBO services, in-house
      banking, treasury centralization, liquidity management, and escrow
      services. Provides full Virtual IBAN Management and Open Banking
      capability.
    humanURL: https://www.montran.com/solutions/virtual-accounts/
    tags:
      - Virtual Accounts
      - Cash Management
      - Treasury
      - POBO
      - Open Banking
    properties:
      - type: Documentation
