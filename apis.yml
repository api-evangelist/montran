apis:
  - name: Montran Global Payments Hub
    description: >-
      A global, highly secure payment solution that consolidates all payment
      infrastructures into a payment hub supporting multiple banks, branches,
      countries, currencies, and languages. Processes clearing and settlement
      transactions including SEPA, Target2, Fedwire, CHIPS, RTGS, ACH, and
      cross-border payments.
    image: https://www.montran.com/images/payment-api.png
    humanURL: https://www.montran.com/solutions/global-payments-hub/
    tags:
      - Payments
      - Clearing
      - Settlement
      - Multi-Currency
      - Cross-Border
    properties:
      - type: Documentation
        url: https://www.montran.com/solutions/global-payments-hub/
      - type: OpenAPI
        url: openapi/montran-global-payments-hub-openapi.yml
