      - type: JSONSchema
        url: json-schema/montran-transaction-schema.json
      - type: JSONLD
        url: json-ld/montran-context.jsonld
  - name: Montran Intraday Liquidity Management
    description: >-
      An enterprise-level system delivering real-time liquidity management with
      live monitoring, an intuitive user interface for granular insight into cash
      positions, and complete control over cash movement anytime, anywhere.
    humanURL: https://www.montran.com/solutions/intraday-liquidity-management/
    tags:
      - Liquidity
      - Cash Management
      - Banking
      - Real-Time
      - Monitoring
    properties:
      - type: Documentation
        url: https://www.montran.com/solutions/intraday-liquidity-management/
  - name: Montran Cash Pool Engine
    description: >-
      Provides multi-currency cash concentration and notional pooling, generating
      end-of-day or real-time sweeps from accounts held within the bank, its
      branches, or third-party banks. Supports ZBA, target, threshold, and
      collar balancing.
    humanURL: https://www.montran.com/solutions/cash-pool-engine/
    tags:
      - Cash Pooling
      - Liquidity
      - Multi-Currency
      - Sweeping
      - Treasury
    properties:
      - type: Documentation
        url: https://www.montran.com/solutions/cash-pool-engine/
  - name: Montran Sanctions Screening
    description: >-
      Enhanced Filtering System (EFS) providing comprehensive payments filtering
      and sanctions screening. Supports multiple compliance lists including OFAC,
      European OFAC, Lloyds MIU, and OFSI. Designed for instant payments with
      native ISO 20022 support.
    humanURL: https://www.montran.com/solutions/sanctions-screening/
    tags:
      - Sanctions
      - Compliance
      - Screening
      - AML
      - Risk Management
    properties:
      - type: Documentation
