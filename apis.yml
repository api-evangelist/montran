  - name: Montran Backup RTGS
    description: >-
      A backup real-time gross settlement solution providing business continuity
      for critical payment infrastructure, ensuring settlement operations
      continue even during primary system outages.
    humanURL: https://www.montran.com/solutions/backup-rtgs/
