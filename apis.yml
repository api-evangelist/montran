  - name: Montran Payments and Collections Factory
    description: >-
      A multi-bank POBO/COBO platform using Virtual Account Management to allow
      corporations to centralize collection and payment-on-behalf-of operations
      regionally or globally. Available as SaaS or on-premise.
    humanURL: https://www.montran.com/solutions/payments-and-collections-factory/
    tags:
      - POBO
      - COBO
      - Corporate Payments
      - Collections
      - Multi-Bank
    properties:
      - type: Documentation
        url: https://www.montran.com/solutions/payments-and-collections-factory/
  - name: Montran In-House Bank
    description: >-
      Enables banks to offer in-house banking capability to global corporate
      customers, providing centralization of operations and controls, bank
      account rationalization, liquidity optimization, and automation of treasury
      policy.
    humanURL: https://www.montran.com/solutions/in-house-bank/
    tags:
      - In-House Banking
      - Treasury
      - Corporate
      - Centralization
      - Liquidity
    properties:
      - type: Documentation
        url: https://www.montran.com/solutions/in-house-bank/
  - name: Montran Mandate Management
    description: >-
      A 24/7, ISO 20022 based, paperless centralized platform for electronic
      mandates for direct debits and credit transfers. Stores and validates
      mandates to decrease risks associated with direct debit payments including
      fraud and operational errors.
    humanURL: https://www.montran.com/solutions/mandate-management/
    tags:
      - Mandates
      - Direct Debits
      - Compliance
      - Payments
      - Risk Management
    properties:
      - type: Documentation
        url: https://www.montran.com/solutions/mandate-management/
  - name: Montran Case Management
    description: >-
      An online system for the automatic processing of all inquiries related to
      payments, both foreign and domestic. Provides investigation and
      compensation capabilities for payment exceptions and disputes.
    humanURL: https://www.montran.com/solutions/case-management/
    tags:
      - Case Management
      - Investigation
      - Disputes
      - Payments
      - Compensation
    properties:
      - type: Documentation
        url: https://www.montran.com/solutions/case-management/
  - name: Montran Dispute Management
    description: >-
      Provides comprehensive dispute resolution capabilities for payment
      transactions, enabling financial institutions to manage and resolve payment
      disputes efficiently.
    humanURL: https://www.montran.com/solutions/dispute-management/
    tags:
