        url: json-schema/montran-payment-schema.json
      - type: JSONSchema
        url: json-schema/montran-account-schema.json
      - type: JSONSchema
        url: json-schema/montran-transaction-schema.json
      - type: JSONSchema
        url: json-schema/montran-financial-institution-schema.json
      - type: JSONLD
        url: json-ld/montran-context.jsonld
  - name: Montran Instant Payments Gateway
    description: >-
      Enables participants in an instant payments ecosystem to support high
      volumes of instant payments in a high availability environment. Complies
      with PSD2 Open API requirements and offers a unified API available 24x7
      based on the ISO 20022 messaging standard.
    image: https://www.montran.com/images/messaging-api.png
    humanURL: https://www.montran.com/solutions/instant-payments-gateway/
    tags:
      - Instant Payments
      - Real-Time
      - PSD2
      - Open API
      - ISO 20022
    properties:
      - type: Documentation
        url: https://www.montran.com/solutions/instant-payments-gateway/
      - type: OpenAPI
        url: openapi/montran-instant-payments-gateway-openapi.yml
      - type: JSONSchema
        url: json-schema/montran-payment-schema.json
      - type: JSONSchema
        url: json-schema/montran-account-schema.json
      - type: JSONSchema
        url: json-schema/montran-transaction-schema.json
      - type: JSONLD
        url: json-ld/montran-context.jsonld
  - name: Montran Instant Payments System
    description: >-
      A robust 24/7, high-capacity, retail-focused payment solution that
      processes individual payments in real-time with guaranteed end-to-end
      payment processing latency of a few seconds. Designed for central banks
      and payment system operators.
    humanURL: https://www.montran.com/solutions/instant-real-time-payments/
    tags:
      - Instant Payments
      - Real-Time
      - Central Banking
      - Market Infrastructure
      - Clearing
    properties:
      - type: Documentation
        url: https://www.montran.com/solutions/instant-real-time-payments/
  - name: Montran Payments Connectivity
    description: >-
      Allows commercial banks to connect to multiple clearing and settlement
      systems and messaging systems such as SWIFT. Provides a single point of
      integration between back-office applications and the external world,
      supporting APIs (REST, SOAP), queue-based, and file-based protocols.
    humanURL: https://www.montran.com/solutions/payments-connectivity/
    tags:
      - Connectivity
      - SWIFT
      - Integration
      - Messaging
      - ISO 20022
    properties:
      - type: Documentation
        url: https://www.montran.com/solutions/payments-connectivity/
      - type: OpenAPI
        url: openapi/montran-payments-connectivity-openapi.yml
      - type: JSONSchema
        url: json-schema/montran-financial-institution-schema.json
      - type: JSONLD
        url: json-ld/montran-context.jsonld
  - name: Montran Real-Time Gross Settlement
    description: >-
      Provides secure, real-time settlement of high-value interbank payments.
      Holds a perfect security track record with no successful attacks on any
      Montran RTGS customer over the past decade.
    humanURL: https://www.montran.com/solutions/real-time-gross-settlement/
    tags:
      - RTGS
      - Settlement
      - Central Banking
      - High-Value Payments
      - Market Infrastructure
    properties:
      - type: Documentation
        url: https://www.montran.com/solutions/real-time-gross-settlement/
  - name: Montran Automated Clearing House
    description: >-
      An electronic clearing system that enables the full spectrum of payment
      instructions to be exchanged among financial institutions. Powers some of
      the largest clearing houses worldwide with support for credit transfers,
      direct debits, and cheques.
    humanURL: https://www.montran.com/solutions/automated-clearing-house/
    tags:
      - ACH
      - Clearing
      - Payments
      - Direct Debits
      - Credit Transfers
    properties:
      - type: Documentation
        url: https://www.montran.com/solutions/automated-clearing-house/
  - name: Montran Automated Transfer System
    description: >-
      Handles very high volumes of both high-value and low-value payments such
      as credit transfers, direct debits, and cheques. Provides a unified
      clearing and settlement platform for diverse payment types.
    humanURL: https://www.montran.com/solutions/automated-transfer-system/
    tags:
      - Clearing
      - Settlement
      - Payments
      - High-Value
      - Low-Value
    properties:
      - type: Documentation
        url: https://www.montran.com/solutions/automated-transfer-system/
  - name: Montran Central Securities Depository
    description: >-
      A 24/7, ISO 20022 compliant platform that facilitates safekeeping of
      dematerialized financial instruments, settlement of trades free or against
      payment, and calculation and distribution of corporate action entitlements.
    humanURL: https://www.montran.com/solutions/central-securities-depository/
    tags:
      - Securities
      - Depository
      - Settlement
      - Corporate Actions
      - Market Infrastructure
    properties:
      - type: Documentation
        url: https://www.montran.com/solutions/central-securities-depository/
  - name: Montran Trading System
    description: >-
      Provides a fast, secure, and innovative platform that facilitates the
      multi-currency trading of financial instruments including debt instruments
      and equities.
    humanURL: https://www.montran.com/solutions/trading-system/
    tags:
      - Trading
      - Securities
      - Multi-Currency
      - Financial Instruments
      - Capital Markets
    properties:
      - type: Documentation
        url: https://www.montran.com/solutions/trading-system/
  - name: Montran Corporate Payments Portal
    description: >-
      Enables corporates to exercise complete control over accounts at their
      various bank relationships, with the ability to make secure payments over
      the Internet. Supports SWIFT payments and local clearing delivery through
      API integration and H2H protocols.
    humanURL: https://www.montran.com/solutions/corporate-payments-portal/
    tags:
      - Corporate Payments
      - Treasury
      - Banking
      - Cash Management
      - Multi-Bank
    properties:
      - type: Documentation
        url: https://www.montran.com/solutions/corporate-payments-portal/
